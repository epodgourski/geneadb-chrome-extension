<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1565c0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d47a1;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="128" height="128" fill="url(#grad)" rx="8"/>
  
  <!-- Document icon -->
  <g transform="translate(32, 20)">
    <!-- Paper -->
    <rect x="5" y="0" width="55" height="75" fill="white" rx="2"/>
    
    <!-- Lines -->
    <line x1="12" y1="15" x2="52" y2="15" stroke="#1565c0" stroke-width="2"/>
    <line x1="12" y1="28" x2="52" y2="28" stroke="#1565c0" stroke-width="2"/>
    <line x1="12" y1="41" x2="52" y2="41" stroke="#1565c0" stroke-width="2"/>
    
    <!-- Download arrow -->
    <path d="M 30 50 L 30 65 M 25 60 L 30 65 L 35 60" stroke="#1565c0" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <!-- GeneaDB text at bottom -->
  <text x="64" y="110" font-size="10" fill="white" text-anchor="middle" font-weight="bold">geneadb</text>
</svg>
